<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画像加工・部品合成アプリ</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>Parts Maker & Image Editor</h1>
        </header>
        
        <main class="app-grid">
            <!-- Left: Main Image Area -->
            <section class="panel left-panel">
                <div class="panel-header">
                    <h2>メイン画像編集</h2>
                    <span class="subtitle">元画像のクリーンアップ</span>
                </div>
                
                <div class="canvas-container" id="mainCanvasContainer">
                    <div class="drop-zone" id="dropZone">
                        <p>画像をドラッグ＆ドロップ、クリックで選択、<br>またはクリップボードから貼り付け (Ctrl+V)</p>
                        <input type="file" id="fileInput" accept="image/png, image/jpeg, image/bmp">
                    </div>
                    <canvas id="mainCanvas"></canvas>
                    <canvas id="previewCanvas"></canvas>
                </div>

                <div class="controls-group">
                    <div class="control-item">
                        <label for="thresholdSlider">掃除（白飛ばし）閾値: <span id="thresholdVal">200</span></label>
                        <input type="range" id="thresholdSlider" min="0" max="255" value="200">
                    </div>
                    
                    <div class="control-item">
                        <label for="imageScaleSlider">基本画像サイズ調整: <span id="imageScaleVal">100</span>%</label>
                        <input type="range" id="imageScaleSlider" min="10" max="300" value="100">
                    </div>
                    
                    <div class="control-item flex-row">
                        <button id="toggleMainEraser" class="toggle-btn">メイン画像消しゴム: <span class="status">OFF</span></button>
                        <div class="sub-control">
                            <label for="mainEraserSize">サイズ: <span id="mainEraserSizeVal">20</span></label>
                            <input type="range" id="mainEraserSize" min="5" max="100" value="20">
                        </div>
                    </div>
                </div>
            </section>

            <div class="right-panels">
                <!-- Right Top: Parts Creation -->
                <section class="panel right-top-panel">
                    <div class="panel-header">
                        <h2>部品作成</h2>
                        <span class="subtitle">文字部品の作成・加工</span>
                    </div>

                    <div class="controls-group">
                        <div class="control-item">
                            <label for="textInput">テキスト入力</label>
                            <input type="text" id="textInput" value="小" placeholder="文字を入力...">
                        </div>
                        <div class="control-item">
                            <label for="fontSelect">フォント選択</label>
                            <select id="fontSelect">
                                <option value="'HG正楷書体-PRO', 'Klee One', serif">楷書体</option>
                                <option value="'HG行書体', 'Yuji Syuku', serif">行書体</option>
                                <option value="sans-serif">ゴシック体（標準）</option>
                            </select>
                        </div>
                        <div class="control-item">
                            <label for="stampSizeSlider">部品サイズ: <span id="stampSizeVal">100</span>%</label>
                            <input type="range" id="stampSizeSlider" min="10" max="300" value="100">
                        </div>
                    </div>

                    <div class="parts-canvas-wrapper" id="partsCanvasWrapper">
                        <canvas id="partsCanvas" width="400" height="200"></canvas>
                    </div>

                    <div class="controls-group">
                        <div class="control-item flex-row">
                            <button id="togglePartsEraser" class="toggle-btn">透過消しゴム: <span class="status">OFF</span></button>
                            <div class="sub-control">
                                <label for="partsEraserSize">サイズ: <span id="partsEraserSizeVal">10</span></label>
                                <input type="range" id="partsEraserSize" min="2" max="50" value="10">
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Right Bottom: Synthesis -->
                <section class="panel right-bottom-panel">
                    <div class="panel-header">
                        <h2>合成・調整・保存</h2>
                        <span class="subtitle">位置・スタイル調整と出力</span>
                    </div>

                    <div class="controls-group synthesis-controls">
                        <button id="synthesizeBtn" class="primary-btn">部品を配置 / 更新</button>
                        
                        <div class="d-pad">
                            <button class="arrow-btn up" id="btnUp">▲</button>
                            <div class="d-pad-middle">
                                <button class="arrow-btn left" id="btnLeft">◀</button>
                                <div class="d-pad-center"></div>
                                <button class="arrow-btn right" id="btnRight">▶</button>
                            </div>
                            <button class="arrow-btn down" id="btnDown">▼</button>
                        </div>
                    </div>

                    <div class="controls-group">
                        <div class="control-item slider-steps">
                            <label for="globalGrayscaleSlider">全体の濃さ (グレースケール): <span id="globalGrayscaleVal">100</span>%</label>
                            <input type="range" id="globalGrayscaleSlider" min="0" max="4" value="4" step="1">
                        </div>
                        <div class="control-item slider-steps">
                            <label for="thicknessSlider">全体の太さ（5段階）: <span id="thicknessVal">3</span></label>
                            <input type="range" id="thicknessSlider" min="1" max="5" value="3" step="1">
                        </div>
                    </div>

                    <div class="save-wrapper" style="margin-top:auto">
                        <button id="saveBmpBtn" class="action-btn">BMP形式で保存</button>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
